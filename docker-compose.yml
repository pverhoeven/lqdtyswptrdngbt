services:
  paper-trader:
    build: .
    env_file:
      - path: .env
        required: false   # niet nodig op Oracle Cloud (secrets via OCI Vault)
    environment:
      - OCI_VAULT_OCID   # Oracle Cloud: haalt Telegram credentials op uit OCI Vault
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config   # mount zodat je config.yaml kunt aanpassen zonder rebuild
    restart: unless-stopped
    command: ["python", "scripts/run_paper_trader.py", "--filter", "bos20"]

  daily-report:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      - OCI_VAULT_OCID
    volumes:
      - ./config:/app/config
    restart: unless-stopped
    # Stuurt rapport bij opstart + daarna elke dag om 07:00 UTC
    # Pas --hour aan voor een ander tijdstip (UTC)
    command: ["python", "scripts/run_daily_report.py", "--daemon", "--hour", "7"]
